name: Deploy to GitHub Pages

# Builds the Vite site and publishes the dist/ folder to GitHub Pages
# every time you push to the main branch. Also lets you run it manually
# from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the official GitHub Pages deploy action
permissions:
  contents: read
  pages: write
  id-token: write

# If you push twice in a row, cancel the older run so only the latest
# build ends up live.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
